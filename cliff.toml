# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration
#
# Generates CHANGELOG.md (full history, including an "Unreleased" section).

[changelog]
# Rendered once at the top of the changelog.
header = ""
# Rendered for each release.
body = """
{% if version %}\
    <a name="{{ version }}"></a>
    ## {% if previous.version %}[{{ version }}]{% else %}{{ version }}{% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    <a name="unreleased"></a>
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
    ### {{ group }}
    {% for commit in commits %}\
        - [`{{ commit.id | truncate(length=7, end="") }}`](<REPO>/commit/{{ commit.id }}) {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message }}{% if commit.links %} ({% for link in commit.links %}{{ link.text }}{% if not loop.last %}, {% endif %}{% endfor %}){% endif %}
    {% endfor %}
{% endfor %}\
"""
# Rendered once at the bottom of the changelog (reference-style compare links).
footer = """
{% for release in releases -%}
    {% if release.version -%}
        {% if release.previous.version -%}
            [{{ release.version }}]: <REPO>/compare/{{ release.previous.version }}...{{ release.version }}
        {% endif -%}
    {% else -%}
        [Unreleased]: <REPO>/compare/{{ release.previous.version }}...HEAD
    {% endif -%}
{% endfor %}\
"""
# Remove leading/trailing whitespace (and template indentation) from the body.
trim = true
# Replace the <REPO> placeholder with the repository URL.
postprocessors = [
    { pattern = '<REPO>', replace = "https://github.com/s4heid/bosh-azure-stemcell-mirror" },
]

[git]
# Parse commits according to the conventional commits specification.
conventional_commits = true
# Exclude commits that do not follow the conventional commits specification.
filter_unconventional = true
# Exclude commits that are not matched by any of the commit parsers below.
filter_commits = true
# Assign commits to groups by their conventional type (order controls nothing;
# groups are rendered alphabetically by title to match the previous tooling).
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance Improvements" },
    { message = "^refactor", group = "Code Refactoring" },
    { message = "^docs", group = "Documentation" },
    { message = "^ci", group = "Continous Integration" },
    { message = "^chore", group = "Chores" },
]
# Extract issue references (e.g. #123) so they can be rendered next to commits.
link_parsers = [
    { pattern = '#(\d+)', href = "https://github.com/s4heid/bosh-azure-stemcell-mirror/issues/$1" },
]
# Only treat vX.Y.Z tags as releases.
tag_pattern = '^v[0-9]+\.[0-9]+\.[0-9]+$'
# Show newest commits first within each group.
sort_commits = "newest"
